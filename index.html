<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23e6177a'/%3E%3Ctext x='50' y='68' font-size='40' text-anchor='middle' fill='%23fff' font-family='sans-serif' font-weight='800'%3ETYT%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23e6177a'/%3E%3Ctext x='50' y='68' font-size='40' text-anchor='middle' fill='%23fff' font-family='sans-serif' font-weight='800'%3ETYT%3C/text%3E%3C/svg%3E">

<style>
:root{
  --bg:#0c0b10; --bg2:#15131d; --card:#1b1825; --card2:#221e30;
  --line:#312b42; --txt:#f2eef9; --dim:#9b93ad; --dim2:#6f6880;
  --magenta:#e6177a; --magenta-d:#b50f5f; --cyan:#28e0c8; --gold:#ffc23d;
  --ok:#28e07a; --r:14px; --maxw:780px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(230,23,122,.16), transparent 60%),
    radial-gradient(900px 500px at -10% 10%, rgba(40,224,200,.10), transparent 55%),
    var(--bg);
  color:var(--txt); line-height:1.45; -webkit-font-smoothing:antialiased;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 80px) env(safe-area-inset-left);
}
header{position:sticky;top:0;z-index:30;backdrop-filter:blur(14px);
  background:linear-gradient(180deg,rgba(12,11,16,.92),rgba(12,11,16,.66));
  border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top)}
.hbar{max-width:var(--maxw);margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px}
.logo{font-weight:800;font-size:1.05rem;letter-spacing:-.5px;display:flex;align-items:center;gap:9px}
.logo .badge{background:var(--magenta);color:#fff;font-size:.72rem;font-weight:800;padding:3px 8px;border-radius:8px;letter-spacing:.5px}
.spacer{flex:1}
.lang-toggle{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--card)}
.lang-toggle button{background:none;border:none;color:var(--dim);font-weight:700;font-size:.78rem;padding:7px 11px;cursor:pointer;transition:.15s}
.lang-toggle button.on{background:var(--magenta);color:#fff}
.progress-wrap{padding:14px 16px 4px;max-width:var(--maxw);margin:0 auto}
.pg-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.pg-num{font-size:1.7rem;font-weight:800;letter-spacing:-1px}
.pg-num small{font-size:.95rem;color:var(--dim);font-weight:600}
.pg-pct{font-size:1.05rem;font-weight:800;color:var(--cyan)}
.bar{height:10px;background:var(--card2);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.bar > i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--magenta),var(--gold));transition:width .4s cubic-bezier(.2,.8,.2,1)}
.mini-stats{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.chip{background:var(--card);border:1px solid var(--line);border-radius:99px;padding:5px 11px;font-size:.78rem;color:var(--dim);font-weight:600}
.chip b{color:var(--txt)}
.controls{position:sticky;top:62px;z-index:20;padding:10px 16px;max-width:var(--maxw);margin:0 auto;background:linear-gradient(180deg,rgba(12,11,16,.9),rgba(12,11,16,.5))}
.search{width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);padding:11px 14px;border-radius:11px;font-size:.95rem;outline:none}
.search:focus{border-color:var(--magenta)}
.filters{display:flex;gap:7px;margin-top:9px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.filters button{white-space:nowrap;background:var(--card);border:1px solid var(--line);color:var(--dim);font-weight:700;font-size:.8rem;padding:8px 13px;border-radius:99px;cursor:pointer;transition:.15s}
.filters button.on{background:var(--txt);color:var(--bg);border-color:var(--txt)}
main{max-width:var(--maxw);margin:14px auto 0;padding:0 16px}
.team{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:11px;overflow:hidden;animation:rise .4s both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.team-head{display:flex;align-items:center;gap:11px;padding:13px 15px;cursor:pointer;user-select:none}
.team-head:active{background:var(--card2)}
.t-flag{font-size:1.4rem;line-height:1;width:28px;text-align:center}
.t-name{font-weight:700;font-size:.98rem;flex:1}
.t-name .code{color:var(--dim2);font-weight:600;font-size:.78rem;margin-left:6px}
.t-prog{font-size:.78rem;color:var(--dim);font-weight:700;font-variant-numeric:tabular-nums}
.t-prog.full{color:var(--ok)}
.t-bar{height:4px;background:var(--card2)}
.t-bar > i{display:block;height:100%;background:var(--magenta);transition:width .3s}
.chev{color:var(--dim2);transition:transform .25s;font-size:.85rem}
.team.open .chev{transform:rotate(90deg)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:8px;padding:0 13px 14px}
.st{position:relative;aspect-ratio:3/4;border-radius:10px;border:1.5px solid var(--line);background:var(--card2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.13s;overflow:hidden;text-align:center;padding:4px}
.st:active{transform:scale(.94)}
.st .fl{font-size:1rem;line-height:1}
.st .n{font-size:.68rem;color:var(--dim2);font-weight:700;font-variant-numeric:tabular-nums;margin-top:1px}
.st .p{font-size:.6rem;color:var(--dim);line-height:1.12;margin-top:2px;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.st.owned{background:linear-gradient(160deg,var(--magenta-d),var(--magenta));border-color:var(--magenta)}
.st.owned .n,.st.owned .p{color:#fff}
.st.owned::after{content:"✓";position:absolute;top:3px;right:5px;font-size:.7rem;color:#fff;font-weight:800}
.st.special{border-color:var(--gold)}
.st.special.owned{box-shadow:inset 0 0 0 2px var(--gold)}
.st .dup{position:absolute;bottom:0;left:0;right:0;background:var(--gold);color:#1a1206;font-size:.62rem;font-weight:800;padding:1px}
.st-empty{grid-column:1/-1;text-align:center;color:var(--dim2);padding:18px;font-size:.85rem}
.fab{position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom) + 16px);z-index:40;width:54px;height:54px;border-radius:16px;border:none;background:var(--magenta);color:#fff;font-size:1.4rem;cursor:pointer;box-shadow:0 8px 24px rgba(230,23,122,.4)}
.fab:active{transform:scale(.92)}
.overlay{position:fixed;inset:0;z-index:60;background:rgba(5,4,9,.7);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.sheet{background:var(--bg2);border:1px solid var(--line);border-bottom:none;border-radius:20px 20px 0 0;width:100%;max-width:var(--maxw);max-height:88vh;overflow-y:auto;padding:18px 18px calc(env(safe-area-inset-bottom) + 24px);animation:up .28s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet h2{font-size:1.15rem;margin-bottom:4px}
.sheet .sub{color:var(--dim);font-size:.85rem;margin-bottom:16px}
.row-act{display:flex;flex-direction:column;gap:9px;margin-bottom:8px}
.act{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer;transition:.13s;color:var(--txt);text-align:left;width:100%;font-size:.92rem;font-weight:600}
.act:active{background:var(--card2)}
.act .em{font-size:1.2rem}
.act small{display:block;color:var(--dim);font-weight:500;font-size:.76rem;margin-top:2px}
.act.danger{border-color:#5a2230}
.close-x{float:right;background:var(--card);border:1px solid var(--line);color:var(--txt);width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:1rem}
textarea.imp{width:100%;min-height:120px;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:11px;font-family:ui-monospace,monospace;font-size:.8rem;resize:vertical;outline:none}
textarea.imp:focus{border-color:var(--cyan)}
.btn{background:var(--magenta);border:none;color:#fff;font-weight:700;padding:11px 16px;border-radius:11px;cursor:pointer;font-size:.9rem;margin-top:10px}
.btn.ghost{background:var(--card);border:1px solid var(--line);color:var(--txt)}
.hint{font-size:.76rem;color:var(--dim);margin-top:8px;line-height:1.5}
.hint code{background:var(--card);padding:1px 6px;border-radius:5px;color:var(--cyan)}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);z-index:90;background:var(--txt);color:var(--bg);padding:10px 18px;border-radius:99px;font-weight:700;font-size:.85rem;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1;bottom:100px}
.offline-tag{font-size:.72rem;color:var(--ok);font-weight:700}
</style>
</head>
<body>

<header>
  <div class="hbar">
    <div class="logo"><span class="badge">TYT</span><span id="appName" data-i="appTitle">Album de TYT</span></div>
    <div class="spacer"></div>
    <div class="lang-toggle" id="langToggle">
      <button data-lang="es">ES</button>
      <button data-lang="en">EN</button>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="pg-top">
      <div class="pg-num"><span id="owned">0</span><small> / <span id="total">0</span> <span data-i="stickers">cromos</span></small></div>
      <div class="pg-pct" id="pct">0%</div>
    </div>
    <div class="bar"><i id="barFill" style="width:0%"></i></div>
    <div class="mini-stats">
      <span class="chip"><span data-i="missing">Faltan</span>: <b id="cMissing">0</b></span>
      <span class="chip"><span data-i="dupes">Repetidas</span>: <b id="cDup">0</b></span>
      <span class="chip"><span data-i="specials">Especiales</span>: <b id="cSpec">0</b></span>
    </div>
  </div>
  <div class="controls">
    <input class="search" id="search" placeholder="Buscar...">
    <div class="filters" id="filters">
      <button data-f="all" class="on" data-i="fAll">Todos</button>
      <button data-f="missing" data-i="fMissing">Faltan</button>
      <button data-f="owned" data-i="fOwned">Pegados</button>
      <button data-f="dup" data-i="fDup">Repetidas</button>
      <button data-f="special" data-i="fSpecial">Especiales</button>
    </div>
  </div>
</header>

<main id="list"></main>
<button class="fab" id="fab" title="Menú">⚙</button>

<div class="overlay" id="sheet">
  <div class="sheet">
    <button class="close-x" id="closeSheet">✕</button>
    <h2 data-i="settings">Ajustes y datos</h2>
    <p class="sub"><span class="offline-tag">● </span><span data-i="offlineNote">Funciona sin conexión</span></p>
    <div class="row-act">
      <button class="act" data-act="fillPlayers"><span class="em">🏷️</span><div><span data-i="actFill"></span><small data-i="actFillSub"></small></div></button>
      <button class="act" data-act="editTeams"><span class="em">🌐</span><div><span data-i="actTeams"></span><small data-i="actTeamsSub"></small></div></button>
      <button class="act" data-act="export"><span class="em">💾</span><div><span data-i="actExport"></span><small data-i="actExportSub"></small></div></button>
      <button class="act" data-act="import"><span class="em">📂</span><div><span data-i="actImport"></span><small data-i="actImportSub"></small></div></button>
      <button class="act danger" data-act="reset"><span class="em">🗑️</span><div><span data-i="actReset"></span><small data-i="actResetSub"></small></div></button>
    </div>
    <p class="hint" id="instHint"></p>
  </div>
</div>

<div class="overlay" id="ioSheet">
  <div class="sheet">
    <button class="close-x" id="closeIo">✕</button>
    <h2 id="ioTitle">—</h2>
    <p class="sub" id="ioSub">—</p>
    <textarea class="imp" id="ioText" spellcheck="false"></textarea>
    <p class="hint" id="ioHint"></p>
    <button class="btn" id="ioApply" data-i="apply">Aplicar</button>
    <button class="btn ghost" id="ioCancel" data-i="cancel" style="margin-left:8px">Cancelar</button>
  </div>
</div>

<input type="file" id="fileIn" accept=".json,.csv" hidden>
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
"use strict";
let lang = "es";
const t = k => (window.I18N[lang][k] ?? k);

/* ---------- persistencia offline ---------- */
const DB_NAME="albumTYT26", STORE="kv", KEY="state";
function openDB(){return new Promise((res,rej)=>{if(!("indexedDB" in window))return rej("no");
  const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>r.result.createObjectStore(STORE);
  r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function saveState(){const data=JSON.stringify(state);
  try{const db=await openDB();await new Promise((res,rej)=>{const tx=db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).put(data,KEY);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});}
  catch(e){try{localStorage.setItem(DB_NAME,data);}catch(_){}}}
async function loadState(){try{const db=await openDB();
  const v=await new Promise((res,rej)=>{const tx=db.transaction(STORE,"readonly");
    const rq=tx.objectStore(STORE).get(KEY);rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error);});
  if(v)return JSON.parse(v);}catch(e){}
  try{const ls=localStorage.getItem(DB_NAME);if(ls)return JSON.parse(ls);}catch(e){}return null;}

/* ---------- estado ---------- */
let state=null, filter="all", query="", openGroups={};
function clone(x){return JSON.parse(JSON.stringify(x));}
function freshState(){
  const st=clone(window.ALBUM_STICKERS).map(s=>({...s,owned:false,count:0}));
  return {version:2, lang:"es", teams:clone(window.TEAMS), stickers:st};
}

const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
function teamObj(code){return state.teams.find(x=>x.code===code);}
function groupName(code){
  const tm=teamObj(code); if(tm) return tm[lang]||tm.es;
  const sec=window.SECTION_NAMES&&window.SECTION_NAMES[code];
  return sec?(sec[lang]||sec.es):code;
}
function groupFlag(code){const tm=teamObj(code);if(tm)return tm.flag||"";
  const s=state.stickers.find(x=>x.team===code);return s?s.flag:"⭐";}
function typeLabel(ty){return {photo:t("typePhoto"),badge:t("typeBadge"),player:t("typePlayer"),special:t("typeExtra")}[ty]||"";}

function matches(s){
  if(filter==="missing"&&s.owned)return false;
  if(filter==="owned"&&!s.owned)return false;
  if(filter==="dup"&&s.count<=1)return false;
  if(filter==="special"&&!s.special)return false;
  if(query){const q=query.toLowerCase();
    const ok=(s.name||"").toLowerCase().includes(q)||groupName(s.team).toLowerCase().includes(q)
      ||String(s.label).toLowerCase().includes(q)||(s.team||"").toLowerCase().includes(q);
    if(!ok)return false;}
  return true;
}
function groupOrder(){
  const keys=[];
  state.stickers.forEach(s=>{if(!keys.includes(s.team))keys.push(s.team);});
  return keys;
}

let toastT;
function toast(m){const e=$("#toast");e.textContent=m;e.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove("show"),1600);}

function render(){
  const total=state.stickers.length;
  const owned=state.stickers.filter(s=>s.owned).length;
  $("#total").textContent=total;$("#owned").textContent=owned;
  $("#cMissing").textContent=total-owned;
  $("#cDup").textContent=state.stickers.filter(s=>s.count>1).length;
  $("#cSpec").textContent=state.stickers.filter(s=>s.special).length;
  const pct=total?Math.round(owned/total*100):0;$("#pct").textContent=pct+"%";$("#barFill").style.width=pct+"%";

  const searching=query||filter!=="all";
  const list=$("#list");list.innerHTML="";
  const order=groupOrder(); let shown=0;
  order.forEach((code,gi)=>{
    const all=state.stickers.filter(s=>s.team===code);
    if(!all.length)return;
    const items=all.filter(matches);
    if(searching&&!items.length)return;
    shown++;
    const ow=all.filter(s=>s.owned).length;
    const isOpen=searching||openGroups[code];
    const el=document.createElement("section");
    el.className="team"+(isOpen?" open":"");
    el.style.animationDelay=Math.min(gi*18,260)+"ms";
    const tp=all.length?Math.round(ow/all.length*100):0;
    el.innerHTML=`<div class="team-head" data-g="${code}">
      <span class="t-flag">${groupFlag(code)}</span>
      <span class="t-name">${groupName(code)}${teamObj(code)?`<span class="code">${teamObj(code).group?teamObj(code).group+" · ":""}${code}</span>`:""}</span>
      <span class="t-prog ${ow===all.length?"full":""}">${ow}/${all.length}</span>
      <span class="chev">▶</span></div>
      <div class="t-bar"><i style="width:${tp}%"></i></div>`;
    if(isOpen){
      const grid=document.createElement("div");grid.className="grid";
      (searching?items:all).forEach(s=>{
        const c=document.createElement("div");
        c.className="st"+(s.owned?" owned":"")+(s.special?" special":"");
        c.dataset.id=s.id;
        c.innerHTML=`<div class="fl">${s.flag||""}</div>
          <div class="n">${s.raw?s.label:"#"+s.label}</div>
          <div class="p">${s.name?s.name:(s.raw?"":(s.type==="player"?"—":typeLabel(s.type)))}</div>
          ${s.count>1?`<div class="dup">×${s.count}</div>`:""}`;
        grid.appendChild(c);
      });
      el.appendChild(grid);
    }
    list.appendChild(el);
  });
  if(!shown){const d=document.createElement("div");d.className="st-empty";d.textContent=t("tEmpty");list.appendChild(d);}
}

/* ---------- interacción ---------- */
let pressTimer,longPress=false;
$("#list").addEventListener("click",e=>{
  const h=e.target.closest(".team-head");
  if(h){const g=h.dataset.g;openGroups[g]=!openGroups[g];render();return;}
  const st=e.target.closest(".st");
  if(st&&!longPress){const s=state.stickers.find(x=>x.id==st.dataset.id);
    if(!s.owned){s.owned=true;s.count=1;}else{s.count++;}saveState();render();}
  longPress=false;
});
$("#list").addEventListener("pointerdown",e=>{const st=e.target.closest(".st");if(!st)return;
  pressTimer=setTimeout(()=>{longPress=true;const s=state.stickers.find(x=>x.id==st.dataset.id);
    if(s.count>1){s.count--;}else{s.owned=false;s.count=0;}saveState();render();},480);});
["pointerup","pointerleave","pointercancel"].forEach(ev=>$("#list").addEventListener(ev,()=>clearTimeout(pressTimer)));

$("#filters").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  $$("#filters button").forEach(x=>x.classList.remove("on"));b.classList.add("on");filter=b.dataset.f;render();});
let sT;$("#search").addEventListener("input",e=>{clearTimeout(sT);sT=setTimeout(()=>{query=e.target.value.trim();render();},180);});

function setLang(l){lang=l;state.lang=l;document.documentElement.lang=l;
  $$("#langToggle button").forEach(b=>b.classList.toggle("on",b.dataset.lang===l));
  $$("[data-i]").forEach(el=>el.textContent=t(el.dataset.i));
  $("#appName").textContent=window.APP_NAME||t("appTitle");
  $("#search").placeholder=t("searchPh");$("#instHint").innerHTML=t("instHint");
  saveState();render();}
$("#langToggle").addEventListener("click",e=>{const b=e.target.closest("button");if(b)setLang(b.dataset.lang);});

/* ---------- sheets ---------- */
const sheet=$("#sheet"),ioSheet=$("#ioSheet");
$("#fab").onclick=()=>sheet.classList.add("show");
$("#closeSheet").onclick=()=>sheet.classList.remove("show");
$("#closeIo").onclick=$("#ioCancel").onclick=()=>ioSheet.classList.remove("show");
[sheet,ioSheet].forEach(o=>o.addEventListener("click",e=>{if(e.target===o)o.classList.remove("show");}));

let ioMode=null;
function openIo(mode){ioMode=mode;sheet.classList.remove("show");ioSheet.classList.add("show");
  if(mode==="fillPlayers"){$("#ioTitle").textContent=t("ioFillTitle");$("#ioSub").textContent=t("ioFillSub");
    $("#ioHint").innerHTML=t("ioFillHint");$("#ioText").value="";$("#ioText").placeholder="MEX,3,Luis Malagón\nCC1,,Lamine Yamal";}
  else if(mode==="editTeams"){$("#ioTitle").textContent=t("ioTeamsTitle");$("#ioSub").textContent=t("ioTeamsSub");
    $("#ioHint").innerHTML=t("ioTeamsHint");$("#ioText").value=JSON.stringify(state.teams,null,1);}}
$("#ioApply").onclick=()=>{const txt=$("#ioText").value.trim();
  try{
    if(ioMode==="fillPlayers"){let n=0;
      txt.split(/\r?\n/).forEach(line=>{if(!line.trim())return;
        const p=line.split(",").map(x=>x.trim());
        const name=p[p.length-1];
        let s=null;
        if(p.length>=3) s=state.stickers.find(x=>x.team===p[0] && String(x.label)===p[1]);
        if(!s) s=state.stickers.find(x=>String(x.label)===p[0] && (x.special||x.raw));
        if(s){if(name)s.name=name;n++;}});
      toast(n+" / "+t("done"));}
    else if(ioMode==="editTeams"){const arr=JSON.parse(txt);
      if(!Array.isArray(arr)||!arr.length)throw "x";
      state.teams=arr.map(x=>({code:x.code,group:x.group||"",es:x.es||x.name||x.code,en:x.en||x.name||x.code,flag:x.flag||""}));
      toast(t("done"));}
    saveState();render();ioSheet.classList.remove("show");
  }catch(e){toast("⚠ Error");}};

$$(".act").forEach(b=>b.addEventListener("click",()=>{const a=b.dataset.act;
  if(a==="fillPlayers"||a==="editTeams"){openIo(a);return;}
  if(a==="export"){const blob=new Blob([JSON.stringify(state)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a2=document.createElement("a");
    a2.href=url;a2.download="album-tyt-backup.json";a2.click();URL.revokeObjectURL(url);toast(t("done"));}
  if(a==="import"){$("#fileIn").click();}
  if(a==="reset"){if(confirm(t("confirmReset"))){state=freshState();state.lang=lang;saveState();sheet.classList.remove("show");render();toast(t("done"));}}
}));
$("#fileIn").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{const d=JSON.parse(rd.result);if(d.stickers&&d.teams){state=d;lang=state.lang||lang;
    saveState();setLang(lang);sheet.classList.remove("show");toast(t("done"));}else throw "x";}
    catch(err){toast("⚠ Error");}};rd.readAsText(f);e.target.value="";});

if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));}

(async()=>{
  const saved=await loadState();
  state=freshState();                       // estructura + nombres desde data.js (fuente de verdad)
  if(saved && Array.isArray(saved.stickers)){
    const prog={}; saved.stickers.forEach(s=>{prog[s.team+"|"+s.label]={owned:!!s.owned,count:s.count||0};});
    state.stickers.forEach(s=>{const p=prog[s.team+"|"+s.label]; if(p){s.owned=p.owned;s.count=p.count;}});
    if(saved.lang) state.lang=saved.lang;
  }
  saveState();
  setLang(state.lang||"es");
})();
</script>
</body>
</html>
